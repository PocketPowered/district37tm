query EventPreviewsByDate($conferenceId: BigInt!, $dateKey: BigInt!) {
  eventsCollection(
    filter: { conference_id: { eq: $conferenceId }, date_key: { eq: $dateKey } }
    orderBy: [{ start_time: AscNullsLast }]
  ) {
    edges {
      node {
        id
        images
        title
        start_time
        end_time
        location_info
        tag
      }
    }
  }
}
