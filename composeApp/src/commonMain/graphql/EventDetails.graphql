query EventDetails($id: BigInt!, $conferenceId: BigInt!) {
  eventsCollection(first: 1, filter: { id: { eq: $id }, conference_id: { eq: $conferenceId } }) {
    edges {
      node {
        id
        images
        title
        description
        start_time
        end_time
        location_info
        additional_links
        tag
      }
    }
  }
}
