query ActiveConference {
  conferencesCollection(
    first: 1
    filter: { is_active: { eq: true } }
    orderBy: [{ updated_at: DescNullsLast }]
  ) {
    edges {
      node {
        id
        name
        schedule_title
        app_header_title
        start_date
        end_date
      }
    }
  }
}
