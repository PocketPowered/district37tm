query ResourcesByType($conferenceId: BigInt!, $resourceType: String!) {
  resourcesCollection(
    filter: { conference_id: { eq: $conferenceId }, resource_type: { eq: $resourceType } }
    orderBy: [{ created_at: DescNullsLast }]
  ) {
    edges {
      node {
        id
        display_name
        url
        description
      }
    }
  }
}
