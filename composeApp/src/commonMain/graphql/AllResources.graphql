query AllResources($conferenceId: BigInt!) {
  resourcesCollection(
    filter: { conference_id: { eq: $conferenceId } }
    orderBy: [{ resource_type: AscNullsLast }, { created_at: DescNullsLast }]
  ) {
    edges {
      node {
        id
        resource_type
        display_name
        url
        description
      }
    }
  }
}
