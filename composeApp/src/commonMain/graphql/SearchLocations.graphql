query SearchLocations($conferenceId: BigInt!, $nameLike: String!) {
  locationsCollection(
    filter: { conference_id: { eq: $conferenceId }, location_name: { ilike: $nameLike } }
    orderBy: [{ location_name: AscNullsLast }]
  ) {
    edges {
      node {
        id
        location_name
        location_images
      }
    }
  }
}
